<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>學員工具｜HANA SCENT ARTIST</title>
  <link rel="stylesheet" href="/assets/style.css" />
  <style>
    html,body{height:100%;}
    body{margin:0;background:#f7f7f4;color:#111;overflow:hidden;}
    .tool-shell{height:100vh;display:grid;grid-template-rows:auto 1fr;background:#f7f7f4;}
    .tool-bar{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:14px 24px;border-bottom:1px solid var(--line);background:#fff;z-index:2;}
    .tool-bar strong{font-size:15px;letter-spacing:.22em;font-weight:500;}
    .tool-bar span{font-size:14px;color:#68706a;}
    .tool-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
    .tool-actions a,.tool-actions button{border:1px solid var(--line);background:#fff;color:#111;padding:9px 14px;font:inherit;font-size:14px;cursor:pointer;text-decoration:none;}
    .frame-wrap{position:relative;overflow:auto;background:#f7f7f4;}
    iframe{display:block;width:100%;height:100%;border:0;background:#fff;}
    .locked{min-height:100vh;display:grid;place-items:center;padding:32px;}
    .locked-card{width:min(520px,100%);background:#fff;border:1px solid var(--line);padding:44px;text-align:center;}
    .locked-card h1{font-size:clamp(32px,5vw,52px);margin:12px 0 18px;}
    .hidden{display:none!important;}
    @media(max-width:720px){.tool-bar{align-items:flex-start;flex-direction:column;padding:14px 18px}.tool-actions a,.tool-actions button{font-size:13px;padding:8px 10px}}
  </style>
</head>
<body>
  <main id="locked" class="locked hidden">
    <section class="locked-card">
      <p class="kicker">Student Tools</p>
      <h1>請先登入學員工具</h1>
      <p>此頁面需要先輸入學員密碼。</p>
      <a class="btn primary" href="/student-tools/">前往密碼頁</a>
    </section>
  </main>

  <main id="tool" class="tool-shell hidden">
    <header class="tool-bar">
      <div><strong>HANA SCENT ARTIST</strong><br><span>學員工具</span></div>
      <div class="tool-actions">
        <button id="refresh" type="button">重新載入</button>
        <a href="https://h-s017.github.io/overtrue-course/" target="_blank" rel="noopener">開啟原頁</a>
        <a href="/courses/">返回課程頁</a>
      </div>
    </header>
    <section class="frame-wrap">
      <iframe id="student-frame" title="HANA SCENT ARTIST 學員工具" src="https://h-s017.github.io/overtrue-course/"></iframe>
    </section>
  </main>

  <script>
    (() => {
      const KEY = 'hana_student_tools_unlocked';
      const unlocked = sessionStorage.getItem(KEY) === 'true';
      document.getElementById(unlocked ? 'tool' : 'locked').classList.remove('hidden');
      document.getElementById('refresh')?.addEventListener('click', () => {
        const frame = document.getElementById('student-frame');
        frame.src = frame.src;
      });
    })();
  </script>
</body>
</html>

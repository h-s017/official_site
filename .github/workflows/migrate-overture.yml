name: Migrate Overture Course

on:
  push:
    paths:
      - '.github/workflows/migrate-overture.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout official site
        uses: actions/checkout@v4
        with:
          path: official

      - name: Checkout source course
        uses: actions/checkout@v4
        with:
          repository: h-s017/overtrue-course
          ref: main
          path: source

      - name: Copy complete course into official site
        shell: bash
        run: |
          set -euo pipefail
          target="official/student-tools/overture"
          rm -rf "$target"
          mkdir -p "$target"
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='CNAME' \
            source/ "$target/"
          rm -f "$target/CNAME"

          cat > "$target/access-guard.js" <<'EOF'
          (() => {
            const key = 'hana_student_tools_unlocked';
            if (sessionStorage.getItem(key) !== 'true') {
              const next = encodeURIComponent(location.pathname + location.search + location.hash);
              location.replace('/student-tools/?next=' + next);
            }
          })();
          EOF

          python3 - <<'PY'
          from pathlib import Path
          target = Path('official/student-tools/overture')
          for p in target.glob('*.html'):
              s = p.read_text(encoding='utf-8-sig')
              robots = '<meta name="robots" content="noindex,nofollow">'
              guard = '<script src="/student-tools/overture/access-guard.js"></script>'
              if robots not in s:
                  s = s.replace('</head>', robots + '\n</head>', 1)
              if guard not in s:
                  s = s.replace('</head>', guard + '\n</head>', 1)
              p.write_text(s, encoding='utf-8')
          PY

          find "$target" -maxdepth 2 -type f | sort

      - name: Commit migrated course
        shell: bash
        run: |
          set -euo pipefail
          cd official
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add student-tools/overture
          if git diff --cached --quiet; then
            echo "No migration changes to commit."
            exit 0
          fi
          git commit -m "Migrate complete Overture course into student tools"
          git push

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">HANA SCENT ARTIST logo mark</title>
  <desc id="desc">A black and gray typographic logo for HANA SCENT ARTIST and H.FUGUE ATELIER.</desc>
  <rect width="1200" height="900" fill="#ffffff"/>
  <rect x="70" y="70" width="1060" height="760" fill="none" stroke="#111111" stroke-width="2"/>
  <line x1="190" y1="292" x2="1010" y2="292" stroke="#d8d8d8" stroke-width="1"/>
  <line x1="190" y1="610" x2="1010" y2="610" stroke="#d8d8d8" stroke-width="1"/>
  <text x="600" y="255" text-anchor="middle" font-family="Cormorant Garamond, Times New Roman, serif" font-size="64" letter-spacing="18" fill="#111111">HANA</text>
  <text x="600" y="360" text-anchor="middle" font-family="Cormorant Garamond, Times New Roman, serif" font-size="52" letter-spacing="13" fill="#111111">SCENT ARTIST</text>
  <text x="600" y="466" text-anchor="middle" font-family="Cormorant Garamond, Times New Roman, serif" font-size="30" letter-spacing="8" fill="#666666">OLFACTORY NARRATIVE SPACE</text>
  <text x="600" y="585" text-anchor="middle" font-family="Cormorant Garamond, Times New Roman, serif" font-size="42" letter-spacing="10" fill="#111111">H.FUGUE ATELIER</text>
  <text x="600" y="650" text-anchor="middle" font-family="Cormorant Garamond, Times New Roman, serif" font-size="24" letter-spacing="6" fill="#666666">by Hana</text>
  <circle cx="600" cy="724" r="5" fill="#111111"/>
</svg>

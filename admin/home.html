<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>首頁管理｜HANA CMS</title><link rel="stylesheet" href="./styles.css"><style>.wrap{max-width:960px;margin:0 auto;padding:32px 20px}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}.tabs a,.tabs button{border:1px solid #111;background:#fff;padding:10px 14px;text-decoration:none;color:#111}.card{border:1px solid #dfe3dc;background:#fff;padding:20px;margin:16px 0}.grid{display:grid;gap:12px}.grid label{display:grid;gap:6px}input,textarea,select{width:100%;padding:10px;border:1px solid #c9cec7}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.item{border-top:1px solid #dfe3dc;padding:16px 0}.item h3{margin:0 0 8px}.muted{color:#68706a}.preview{width:min(360px,100%);aspect-ratio:4/3;object-fit:cover;border:1px solid #dfe3dc;background:#f5f6f3}.hidden{display:none!important}</style></head><body><main class="wrap"><p class="eyebrow">HANA SCENT ARTIST</p><h1>首頁管理</h1><p class="muted">管理首頁 HERO 圖片與最新消息。</p><div id="login" class="card"><h2>登入</h2><form id="login-form" class="grid"><label>電子郵件<input id="email" type="email" required></label><label>密碼<input id="pass" type="password" required></label><button class="primary" type="submit">登入</button><p id="login-error" class="error"></p></form></div><div id="app" class="hidden"><div class="tabs"><a href="./">← 回氣味誌後台</a><a href="https://hanascent.com/" target="_blank" rel="noopener">查看首頁</a><button id="logout" type="button">登出</button></div><section class="card"><h2>首頁 HERO 圖片</h2><img id="hero-preview" class="preview" alt="首頁 HERO 預覽"><div class="grid"><label>圖片網址<input id="hero-url" type="url" placeholder="https://..."></label><label>圖片替代文字<input id="hero-alt" placeholder="HANA SCENT ARTIST 首頁主視覺"></label><label>上傳圖片<input id="hero-file" type="file" accept="image/*"></label><div class="row"><button id="upload-hero" class="secondary" type="button">上傳圖片</button><button id="clear-hero" class="secondary" type="button">清空圖片</button><button id="save-hero" class="primary" type="button">儲存 HERO</button></div></div></section><section class="card"><div class="row"><h2 style="flex:1">最新消息</h2><button id="new-news" class="primary" type="button">新增</button><button id="reload-news" class="secondary" type="button">重新載入</button></div><div id="news-list" class="muted">正在載入…</div></section></div></main><dialog id="news-dialog"><form id="news-form" method="dialog" class="dialog-form"><header><h2>最新消息</h2><button type="button" id="close-news">×</button></header><div class="dialog-body grid"><input name="id" type="hidden"><label>標題<input name="title" required></label><label>狀態<select name="status"><option value="draft">草稿</option><option value="published">已發布</option></select></label><label>日期<input name="starts_at" type="date"></label><label>排序權重<input name="priority" type="number" value="100"></label><label>內容<textarea name="content" rows="4"></textarea></label><label>連結網址<input name="link_url" type="url"></label><div class="row"><button id="delete-news" class="danger" type="button">刪除</button><span style="flex:1"></span><button class="secondary" id="cancel-news" type="button">取消</button><button id="save-news" class="primary" type="button">儲存</button></div></div></form></dialog><div id="toast" class="toast"></div><script src="./config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>(()=>{'use strict';const c=window.HANA_CMS_CONFIG||{},db=window.supabase?.createClient(c.supabaseUrl,c.supabaseAnonKey),$=s=>document.querySelector(s);let news=[],session=null,bucket='site-media';function toast(t,e=false){const x=$('#toast');x.textContent=t;x.className='toast show'+(e?' error-toast':'');setTimeout(()=>x.className='toast',4000)}function esc(v=''){return String(v).replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}function err(e){return e?.message||String(e||'操作失敗')}function setApp(s){session=s;$('#login').classList.toggle('hidden',!!s);$('#app').classList.toggle('hidden',!s);if(s){loadHero();loadNews()}}function preview(){const u=$('#hero-url').value||'/assets/homepage-cover.png';$('#hero-preview').src=u;$('#hero-preview').alt=$('#hero-alt').value||'首頁 HERO 預覽'}async function loadHero(){const{data,error}=await db.from('site_settings').select('*').eq('id',1).single();if(error)return toast(err(error),true);$('#hero-url').value=data.hero_image_url||data.home_hero_image_url||'';$('#hero-alt').value=data.hero_image_alt||data.home_hero_image_alt||'';preview()}async function saveHero(){const{error}=await db.from('site_settings').update({hero_image_url:$('#hero-url').value.trim(),hero_image_alt:$('#hero-alt').value.trim()}).eq('id',1);if(error)return toast(err(error),true);toast('HERO 已儲存')}async function uploadHero(){const f=$('#hero-file').files?.[0];if(!f)return $('#hero-file').click();const ext=(f.name.split('.').pop()||'jpg').replace(/[^a-z0-9]/gi,'')||'jpg',path=`home/hero/${Date.now()}.${ext}`;const r=await db.storage.from(bucket).upload(path,f,{contentType:f.type||undefined});if(r.error)return toast(err(r.error),true);const pub=db.storage.from(bucket).getPublicUrl(r.data.path).data.publicUrl;$('#hero-url').value=pub;preview();toast('圖片已上傳，請按儲存 HERO')}async function loadNews(){const{data,error}=await db.from('announcements').select('id,title,content,status,link_url,priority,starts_at,created_at').order('priority').order('created_at',{ascending:false});if(error)return $('#news-list').innerHTML=`無法載入：${esc(error.message)}`;news=data||[];renderNews()}function renderNews(){if(!news.length)return $('#news-list').innerHTML='目前沒有最新消息。';$('#news-list').innerHTML=news.map(n=>`<article class="item"><h3>${esc(n.title||'未命名')}</h3><p class="muted">${esc(n.status||'draft')}｜排序 ${esc(n.priority??100)}｜${esc((n.starts_at||n.created_at||'').slice(0,10))}</p><p>${esc(n.content||'')}</p><div class="row"><button type="button" data-edit="${esc(n.id)}">編輯</button>${n.link_url?`<a href="${esc(n.link_url)}" target="_blank">連結</a>`:''}</div></article>`).join('')}function openNews(n={}){const f=$('#news-form');f.reset();f.id.value=n.id||'';f.title.value=n.title||'';f.status.value=n.status||'draft';f.starts_at.value=n.starts_at?String(n.starts_at).slice(0,10):'';f.priority.value=n.priority??100;f.content.value=n.content||'';f.link_url.value=n.link_url||'';$('#delete-news').classList.toggle('hidden',!n.id);$('#news-dialog').showModal()}async function saveNews(){const f=$('#news-form'),id=f.id.value,p={title:f.title.value.trim(),status:f.status.value,starts_at:f.starts_at.value||null,priority:Number(f.priority.value||100),content:f.content.value||'',link_url:f.link_url.value||''};if(!p.title)return toast('請填標題',true);const r=id?await db.from('announcements').update(p).eq('id',id):await db.from('announcements').insert(p);if(r.error)return toast(err(r.error),true);toast('最新消息已儲存');$('#news-dialog').close();loadNews()}async function delNews(){const id=$('#news-form').id.value;if(!id||!confirm('確定刪除？'))return;const{error}=await db.from('announcements').delete().eq('id',id);if(error)return toast(err(error),true);$('#news-dialog').close();loadNews()}$('#login-form').addEventListener('submit',async e=>{e.preventDefault();const{data,error}=await db.auth.signInWithPassword({email:$('#email').value,password:$('#pass').value});if(error)return $('#login-error').textContent='登入失敗';setApp(data.session)});$('#logout').onclick=()=>db.auth.signOut();$('#hero-url').oninput=preview;$('#hero-alt').oninput=preview;$('#save-hero').onclick=saveHero;$('#upload-hero').onclick=uploadHero;$('#clear-hero').onclick=()=>{$('#hero-url').value='';preview()};$('#reload-news').onclick=loadNews;$('#new-news').onclick=()=>openNews({status:'draft',priority:100});$('#save-news').onclick=saveNews;$('#delete-news').onclick=delNews;$('#close-news').onclick=$('#cancel-news').onclick=()=>$('#news-dialog').close();document.addEventListener('click',e=>{const b=e.target.closest('[data-edit]');if(b)openNews(news.find(n=>String(n.id)===String(b.dataset.edit))) });db.auth.onAuthStateChange((_e,s)=>setApp(s));db.auth.getSession().then(({data})=>setApp(data.session||null));})();</script></body></html>
